<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <style>
          body{
            background-image: url('https://t3.ftcdn.net/jpg/09/52/15/40/360_F_952154047_fI7wy70Iw7qBFMWR2gS4mopPXLcdrjAZ.jpg');
            background-size: cover;
          }
    </style>
</head>
<body>
    <div class="container">
        <div class="row">
            <div class="col-md-6">
                <div class="container rounded shadow shadow-5 mt-5" style="background-color: lavenderblush; width:400px;">
                    <div class="d-flex flex-column justify-content-center align-items-center" style="margin-top:120px;">
                        <h2 class="text-primary mt-4 mb-5">Login Now</h2>
                     <div class="form-floating mb-3" style="width:65%">
                         <input id="username" type="text" class="form-control" placeholder="enter username">
                         <label for="username">Username</label>
                     </div>

                     <div class="form-floating mb-3" style="width:65%">
                         <input id="password" type="password" class="form-control" placeholder="enter password">
                         <label for="password">Password</label>
                     </div>
 
                     <button onclick="submit()" class="btn btn-primary" style="width:50%">Login</button>
                     <a href="#" class="text-decoration-none text-dark mt-3 mb-3">or Login with</a>

                     <div class="d-flex flex-row mb-4">
                        <button type="button" class="d-flex flex-row me-4 border border-none rounded-3">
                            <img src="https://static.vecteezy.com/system/resources/thumbnails/042/148/655/small/facebook-logo-facebook-social-media-icon-free-png.png" width="20px" height="20px" class="mt-2">
                            <a href="#" class="text-primary ms-2 mt-2 text-decoration-none">Facebook</a>
                        </button>

                         <button type="button" class="d-flex flex-row border border-none rounded-3">
                            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c1/Google_%22G%22_logo.svg/250px-Google_%22G%22_logo.svg.png" width="20px" height="20px" class="mt-2">
                            <a href="#" class="text-primary ms-2 mt-2 text-decoration-none">Google</a>
                        </button>

                       
                     </div>
                     <div class="d-flex flex-row">
                      <p class="text-dark ">Not a member?</p> 
                      <a href="signuppage.html" class=" ms-2 mb-5">Signup</a>
                       </div>

                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <img src="https://tvpaint.com/_next/image?url=%2Fimages%2Fcharacters%2Fgirl.png&w=1200&q=75" style="margin-top:100px;">
            </div>
        </div>
    </div>
</body>
<script>
    let savedname= localStorage.getItem("name");
    let savedpassword=localStorage.getItem("password");
</script>
<script>
    function submit(){
        let name=document.getElementById('username').value.trim();
        let password=document.getElementById('password').value.trim();
        if(name===savedname && password===savedpassword){
            alert("login successful");
            window.location.href="about.html";
        }else{
            alert("invalid username or password");
        }
    }
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</html>

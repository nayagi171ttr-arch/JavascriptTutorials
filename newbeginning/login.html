<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
 <style>
    .bganimate{
        position:fixed;
        top:0;
        left:0;
        width:100%;
        height:100%;
        z-index:-1;
       background-image: url('https://t3.ftcdn.net/jpg/06/24/47/06/360_F_624470671_4V0sYcvUXoVn5hZ6CVdugxGDWhbPg41X.jpg');
        background-position: center;
        background-size: cover;
        animation:change 10s infinite ease-in-out;
    }

    @keyframes change {
        0%{
            transform:translate(0,0) scale(1);
        }
        100%{
            transform:translate(-8%,8%) scale(1.5);
        }
        
    }
 </style>
</head>
<body>
    <div class="bganimate"></div>
    <section>
        <div class="container d-flex flex-column rounded mb-5" style="width:600px;margin-top:150px;background-color:bisque;">
            <h2 class="text-primary text-center mt-5">Login</h2>
            <form >
                <label for="name" class="form-label">Name</label>
                <input type="text" class="form-control"  id="name">
                <span id="nameerror" style="color:red;"></span><br>

                 <label for="email" class="form-label">Emailid</label>
                <input type="text" class="form-control"  id="email">
                <span id="emailerror" style="color:red;"></span><br>
               
                <label for="password" class="form-label" >Passoword</label>
                <input type="password" class="form-control" id="cred">
                <span id="passworderror" style="color:red;"></span><br>

                  <label for="Number" class="form-label" >Age</label>
                <input type="Number" class="form-control" id="age">
                <span id="ageerror" style="color:red;"></span><br>

                <button type="button" id="moveon">1</button>

             </form>
              <button id="eventlis" class="btn text-light btn-primary mt-5 mb-5" style="width:100%;" onclick="valid()">Login</button>
        </div>
    </section>
</body>

<script>

    //form validation
  function valid(){
     let name=document.getElementById('name').value.trim();
   let email=document.getElementById('email').value.trim();
   let cred=document.getElementById('cred').value.trim();
   let age=document.getElementById('age').value.trim();
   let isvalid=true;
if(name===""){
    document.getElementById("nameerror").textContent="Enter name";
    isvalid=false;
}
if(email===""){
    document.getElementById("emailerror").textContent="Enter email";
    isvalid=false;
}
if(cred===""){
    document.getElementById("passworderror").textContent="Enter password";
    isvalid=false;
}
if(age===""){
    document.getElementById("ageerror").textContent="Enter age";
    isvalid=false;
}
if(!isvalid) 
  return false;

   else{
    localStorage.setItem('username', name);
    alert("login successful");
    window.location.href="palindrome.html";
    return true;
   }

  }

  //mouse events

  let btn=document.getElementById('eventlis');
  btn.addEventListener('click', (event)=>{
    btn.textContent='View next page';
  });

  btn.addEventListener('mouseover', (event)=>{
    btn.textContent='Logout';
  });

  btn.addEventListener('mouseout', (event)=>{
    btn.style.backgroundColor="red";
  });

  //keyboard events

  let move=document.getElementById('moveon');
document.addEventListener('keydown' ,(event)=>{
   
    switch(event.key){
        case 'ArrowUp':
            move.textContent=Number(move.textContent)+1;
            break;
        case 'ArrowDown':
            move.textContent=Number(move.textContent)-1;
            break;
            
    }
})





</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</html>

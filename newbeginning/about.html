<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
<style>
        .bganimate{
            background-image: url('https://png.pngtree.com/thumb_back/fw800/background/20250904/pngtree-professional-presentation-backgrounds-image_18838779.webp');
            position:fixed;
            background-size: cover;
            background-position: center;
            width: 100vw;  
            height: 100vh;
            top:0;
            left:0;
            z-index:-1;
            transition:0.3s;
            animation:hanging 10s infinite ease-in-out;
        }
        @keyframes hanging{
            0%{
                transform:translate(0,0) scale(1);
            }
             100%{
                transform:translate(-8%,8%) scale(1.2);
            }
        }

           body{
            text-align: center;
            margin-top: 50px;
        }
        input{
            padding: 10px;
            width: 200px;
        }
        button{
            padding: 10px;
            margin-left: 5px;
            cursor: pointer;
        }
        li{
            list-style: none;
            margin: 10px;
            color:white;
        }
        .delete{
            margin-left: 10px;
            background-color: red;
            color: white;
            border: none;
        }
        .h1text{
            margin:90px 0 50px 0;
            
        }
</style>
</head>
<body>
    <div class="bganimate"></div>
    <div class="container">

    <h1 class="text-light mt-5 display-1 fw-bold text-center" id="welcome"></h1>
    </div>
<!-- To Do List-->
    <h1 class="text-light h1text" >Task Manager</h1>

    <input type="text" id="taskInput" placeholder="Enter task">
    <button onclick="addTask()">Add</button>
    

    <ul id="taskList"></ul>

</body>
<script>
    let savedname=localStorage.getItem("name");
    document.getElementById('welcome').innerHTML= `Welcome,  <span style="color:blue;"> ${savedname} </span> <p>Here we Go!!</p>`;
</script>

<script>
  function addTask(){
        let input = document.getElementById("taskInput");
        let task = input.value.trim();

        if(task === ""){
            alert("Enter a task!");
            return;
        }

        let li = document.createElement("li");
        li.textContent = task;

        let delBtn = document.createElement("button");
        delBtn.textContent = "Delete";
        delBtn.className = "delete";

        delBtn.onclick = function(){
            li.remove();
        };

        li.appendChild(delBtn);
        document.getElementById("taskList").appendChild(li);

        input.value = "";
    }
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</html>

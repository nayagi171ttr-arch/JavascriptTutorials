<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

<style>
    .bgimage{
        position:fixed;
        top:0;
        left:0;
        width:100%;
        height:100%;
        z-index:-1;
        background-image: url('https://media.gettyimages.com/id/1469875556/video/4k-abstract-lines-background-loopable.jpg?s=640x640&k=20&c=oRhmLOFm1rQPZQSQrUqnd8eRd8LsoGLmiQS7nMIh-MU=');
        background-position: center;
        background-size: cover;
        animation:change 10s infinite ease-in-out;
    }
    @keyframes change{
        0%{
            transform: translate(0,0) scale(1);
        }
        100%{
            transform:translate(-8%,8%) scale(1.5);
        }
    }
</style>
</head>
<body>
    <div class="bgimage"></div>
    <h1 id="welcomemessage" class="text-light mt-5 text-center display-2 fw-bold"></h1>

   <div class="container rounded" style="background-color: antiquewhite;color:black;width:600px;margin-top:40px;">
    <h2 id="title" class="text-center">Press 1 to 4 any number</h2>
    <div id="inputarea"></div>
    <div class="d-flex justify-content-center align-items-center mt-4">
    <button onclick="calculate()" class="btn btn-primary ">Calculate</button>
    </div>
    <h4 id="result"></h4>
   </div>
    
</body>

<script>
    let savedname=localStorage.getItem("username");
    document.getElementById('welcomemessage').textContent="Welcome, " + savedname;
    </script>
<script>
   let current="";
    document.addEventListener('keydown',function(event){
        let title=document.getElementById('title');
        let inputarea=document.getElementById('inputarea');
        let result=document.getElementById('result');

      switch(event.key){
        case '1':
            current="farenheit";
            title.textContent="Farenheit Converter";
            inputarea.innerHTML=`<input type="Number" placeholder="enter any Number" class="form-control" id="celsius"></input>`;
            break;
        case '2':
            current="leap";
            title.textContent="leap Year or Not";
            inputarea.innerHTML=`<input type="Number" placeholder="enter Number" class="form-control" id="leap"></input>`;
            break;
        case '3':
           current="palindrome";
            title.textContent="Palindrome Checker";
            inputarea.innerHTML=`<input type="Number" placeholder="enter Number" class="form-control" id="palin"></input>`;
            break;
        case '4':
             current="Biggest";
            title.textContent="Biggest Number";
            inputarea.innerHTML=`<input type="Number" placeholder="enter Number" class="form-control" id="a"></input>
            <input type="Number" placeholder="enter Number" class="form-control" id="b"></input>
            <input type="Number" placeholder="enter Number" class="form-control" id="c"></input>`;
            break;
      }
    }
);


function calculate(){
    let result=document.getElementById('result');
    result.textContent="";

    if(current==="farenheit"){
        let c=document.getElementById("celsius").value;
        let r=(c* 9/5)+32;
        result.textContent="Farenheit " + r;
    }

    else if(current==="leap"){
          let c=document.getElementById("leap").value;
          if((c%4===0 && c%100===0) || (c%400===0)){
            result.textContent="Leap Year";
          } 
          else{
            result.textContent="Not a Leap Year";
          }
    }

    else if(current==="palindrome"){
        let str=document.getElementById("palin").value;
        let rev=str.split('').reverse().join('');
        result.textContent=(str===rev)?"palindrome":"Not Palindrome";
    }

    else if(current==="Biggest"){
        let a=Number(document.getElementById("a").value);
        let b=Number(document.getElementById("b").value);
        let c=Number(document.getElementById("c").value);
        result.textContent="Biggest" +Math.max(a,b,c);
    }
    }

</script>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</html>

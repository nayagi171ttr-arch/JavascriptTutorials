<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
<style>

        .container{
            background-color: #f0f4f8;
            display:flex;
            flex-direction:column;
            justify-content: center;
            align-items:center;
        }
        .colors{
            color:blue;
        }
        hr{
            width:50%;border:2px solid dark;
        }
    </style>
</head>
<body>
    <div class="container">
    <h2 class="colors mb-3">General Variables</h2>
    <h4 id="name"></h4>
    <h4 id="col"></h4>
    <h1 class="text-success mt-3 mb-3">If Condition</h1>
    <h2 class="colors mt-3">Calculate</h2>
    <input id="onenum" placeholder="enter a number"><br>
    <input id="twonum" placeholder="enter 2 number"><br>
    <input id="getnum" placeholder="option"><br>
    <button onclick="valid()" id="butt">click</button>
    <h4 id="result"></h4><hr >
    
    <h2 class="colors">Voting eligibility</h2>
    <input id="age" placeholder="enter your age"><br>
    <button id="click" onclick="checkage()">Clicck</button><br>
    <h4 id="agemine"></h4><hr >

    <h2 class="colors">Positive or Negative Checker</h2>
    <input id="numbers" placeholder="enter a number"><br>
    <button id="btns" onclick="checkposi()">Check</button>
    <h4 id="checkvalid"></h4><hr >

    <h2 class="colors">Odd & Even Checker</h2>
    <input id="number" placeholder="enter a number"><br>
    <button id="oddbtn" onclick="odd()">Checkodd</button>
    <h4 id="odd"></h4><hr >

    <h2 class="colors">Grading System</h2>
    <input id="a" placeholder="enter a"><br>
     <input id="b" placeholder="enter b"><br>
      <input id="c" placeholder="enter c"><br>
      <button id="btnmark" onclick="btnchecker()">Percentage</button>
      <h4 id="per"></h4>
      <h4 id="results"></h4>


      <div class="container shadow mt-5" style="width:700px;">
        <h2 class="colors">Login Form</h2>
        <form onclick="login()">
        <input id="login" class="form-control" placeholder="Username"><br>
        <input id="password" class="form-control" placeholder="password"><br>
        <button type="button" class=" btn btn-primary" onclick="logincred()">Login</button><br><br>
        </form>
        <h5 id="validation"></h5><hr>
        
      </div>

<!--Looping-->
      <h1 class="text-success mt-5 mb-4">Looping</h1>
      <input id="print" placeholder="enter number"><br>
      <button class="btn btn-primary" onclick="resultts()">Print</button><br>
      <h4 class="text-danger" id="resultss"></h4><hr>

    
   </div>
</body>
<script>
    let na=document.getElementById("name");
    let co=document.getElementById("col");
    let res=document.getElementById("result");
    
   
    let name="Ranga";
    let age=21;
    let city="Madurai";
    let coll="KLN college";
    let istrue=true;
   
    na.textContent="My name is " +name+ " and my age is " +age;
    co.textContent="My city " +city+ " and my college name is " +coll+ " and yes i like coding " +istrue;


    function valid(){
     let one=Number(document.getElementById("onenum").value);
    let two=Number(document.getElementById("twonum").value);
    let oper=Number(document.getElementById("getnum").value);


    switch(oper){
        case 1:
           
           res.textContent="Result " +(one+two);
           break;
        case 2:
            
            res.textContent="Result " +(one-two);
            break;
        case 3:
            
           res.textContent="Result " +(one*two);
            break;
        case 4:
           res.textContent="Result " +(one/two);
            break;

    }
    }
function checkage(){
    let myage=Number(document.getElementById("age").value);
     let agemine=document.getElementById("agemine");
    if(myage >=18){
       agemine.textContent="Your eligible to vote";
    }
    else{
        agemine.textContent="Your not eligible to vote";
    }
}

function checkposi(){
    let check=Number(document.getElementById("numbers").value);
    let checkvalid=document.getElementById("checkvalid");
    if(check > 0 ){
        checkvalid.textContent="The number is Positive";
    }
    else if(check === 0){
        checkvalid.textContent="The number is Zero";
    }
    else if(check <0){
        checkvalid.textContent="The Number is Negative";
    }
}

function odd(){
    let check=Number(document.getElementById("number").value);
    let odd=document.getElementById("odd");
    if(check%2==0){
        odd.textContent="The number is Even";
    }
    else{
        odd.textContent="The number is odd"
    }

}


function btnchecker(){
    let a=Number(document.getElementById("a").value);
let b=Number(document.getElementById("b").value);
let c=Number(document.getElementById("c").value);
let res=document.getElementById("results");
let per=document.getElementById("per");
let d=((a+b+c)/3) .toFixed(2);
if(d>=85){
  per.textContent="Your avg percentage " +d ;
  res.textContent="Passed With Distinction"
}
else if(d>=50 && d<=85){
     per.textContent="Your avg percentage " +d;
    res.textContent="Passed in FirstClass";
}
else {
     per.textContent="Your avg percentage " +d;
    res.textContent="Failed";
}

}

function logincred(){
  let login=document.getElementById("login").value;
  let password=document.getElementById("password").value;
  let validation=document.getElementById("validation");

  if(login==="admin" && password==="123"){
    validation.textContent="Login Successful";
  }
  else{
    validation.textContent="Enter valid Credencials";
  }
}


<!---->
function resultts(){
   let print=Number(document.getElementById("print").value);
   let resultss=document.getElementById("resultss");
   let output="";
   for(let i=0;i<=print;i++){
    output=output+i+" ";
   }
   resultss.textContent=output;
}





    
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <style>
        .bganimate{
            background-image: url('https://t3.ftcdn.net/jpg/08/27/09/20/360_F_827092074_tUV40nTZFcjGT69jkS2EJErmYQ9HaDK6.jpg');
            position:fixed;
            background-size: cover;
            background-position: center;
            width: 100vw;  
            height: 100vh;
            top:0;
            left:0;
            z-index:-1;
            transition:0.3s;
            animation:hanging 10s infinite ease-in-out;
        }
        @keyframes hanging{
            0%{
                transform:translate(0,0) scale(1);
            }
             100%{
                transform:translate(-8%,8%) scale(1.2);
            }
        }
    </style>
    </head>
<body >
   <div class="bganimate"></div>
    <div class="container rounded-5" style="margin-top:60px;margin-left:130px;margin-bottom:50px;background-color: azure;min-height:600px;width:1200px;">
        <div class="row">
            <div class="col-md-7">
                   <div class="container rounded shadow shadow-5 mt-5" style="background-color:lavenderblush; width:500px;">
                    <div class="d-flex flex-column justify-content-center align-items-center" style="margin-top:60px;">
                        <h2 class="text-primary  mb-5">Sign up</h2>
                     <div class="form-floating mb-3" style="width:65%">
                         <input id="username" type="text" class="form-control" placeholder="enter username" required>
                         <label for="username">Username</label>
                         <span id="checkname"></span>
                     </div>

                     <div class="form-floating mb-3" style="width:65%">
                         <input id="password" type="password" class="form-control" placeholder="enter password" required>
                         <label for="password">Password</label>
                          <span id="checkpassword"></span>
                     </div>

                      <div class="form-floating mb-3" style="width:65%">
                         <input id="email" type="text" class="form-control" placeholder="enter email" required>
                         <label for="email">Email</label>
                          <span id="checkmail"></span>
                     </div>

                      <div class="form-floating mb-3" style="width:65%">
                         <input id="number" type="tel" class="form-control" placeholder="enter number" required>
                         <label for="number">Contact</label>
                          <span id="checknumber"></span>
                     </div>
 
                     <button onclick="submit()" class="btn btn-primary" style="width:50%">Sign Up</button> 
                       <div class="d-flex flex-row mt-4">
                      <p class="text-dark ">Not a member?</p> 
                      <a href="#" class=" ms-2 mb-5">Register for free</a>
                       </div>
             </div>
          </div>
        </div>
     <div class="col-md-5">
                <img src="https://static.vecteezy.com/system/resources/previews/060/116/615/non_2x/smiling-businessman-waving-hand-professional-cartoon-character-free-png.png" width="500px" height="500px" class="mt-5">
            </div>
</body>


<script>
   function submit(){
    let username=document.getElementById('username').value.trim();
    let password=document.getElementById('password').value.trim();
    let email=document.getElementById('email').value.trim();
    let number=document.getElementById('number').value.trim();
    let checkname=document.getElementById('checkname');
    let checkpassword=document.getElementById('checkpassword');
     let checkmail=document.getElementById('checkmail');
    let checknumber=document.getElementById('checknumber');



    const hasUpper=/[A-Z]/.test(password);
    const hasLower=/[a-z]/.test(password);
    const hasDigit=/\d/.test(password);
    const hasspecial=/[@!~#$%^&*()?`]/.test(password);
    
     

       let isvalid=true;

       if(username===""){
             checkname.textContent="Enter name";
             checkname.style.color="red";
             isvalid=false;
       }else{
        checkname.textContent="";
         localStorage.setItem('name',username);
       }

       if(!hasUpper || !hasLower ||!hasDigit ||!hasspecial ||password.length<8 || password.length>16){
             checkpassword.textContent="password must contain atleast one upper,lower,digit,special";
             checkpassword.style.color="red"; 
             isvalid=false;
       }else{
        checkpassword.textContent="";
        
       }

       if(!email.includes('@') || !email.includes('.')){
              checkmail.textContent="enter valid emailid";
               checkmail.style.color="red";
              isvalid=false;
       }else{
        checkmail.textContent="";
       }

       if(number==="" ||number.length!==10){
        checknumber.textContent="Enter number";
        checknumber.style.color="red";
        isvalid=false;
       }
       else{
        checknumber.textContent="";
       }

       if(isvalid){
        alert("form Submitted Successfully!!");
         localStorage.setItem('password',password);
        window.location.href="loginpage.html";
         
       }
   }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</html>

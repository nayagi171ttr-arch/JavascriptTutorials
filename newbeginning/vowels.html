<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
<style>

 .bganimate{
        position:fixed;
        top:0;
        left:0;
        width:100%;
        height:100%;
        z-index:-1;
       background-image: url('https://t3.ftcdn.net/jpg/06/24/47/06/360_F_624470671_4V0sYcvUXoVn5hZ6CVdugxGDWhbPg41X.jpg');
        background-position: center;
        background-size: cover;
        animation:change 10s infinite ease-in-out;
    }

    @keyframes change {
        0%{
            transform:translate(0,0) scale(1);
        }
        100%{
            transform:translate(-8%,8%) scale(1.5);
        }
        
    }
</style>
</head>
<body>
    
    <div class="bganimate"></div>
   
    <div class="container rounded" style="width:600px;background-color: beige;margin-top:100px;min-height:400px;">
        <h2 id="title" style="padding:40px;padding-left:150px;">Counting Vowels</h2>
       <form>

       </form>
        <label for="text" class="form-label ">Enter String</label>
        <input type="text" id="check" class="form-control">
        <button class="btn btn-primary mt-3" onclick="check()">Check</button>
    <h3 id="result" class="mt-5 text-center">Result:</h3>
    </div>
    </form>
   


    <div class="container rounded" style="width:600px;min-height:400px;background-color: lavenderblush;margin-top:60px;margin-bottom:80px;">
        <h2 id="nexttitle" style="padding:40px;padding-left:150px;">Reverse a String</h2>
        <form>
            <label for="text" class="form-label">Enter a String to Reverse</label>
            <input type="text" id="reverse" class="form-control">
            <button onclick="rev()" type="button" class="btn btn-danger text-light mt-5">Reverse:</button>
            <h3 id="reversed" class="text-center">Reversed String:</h3>
            <h5 id="counts" class="text-center">NO.Of.Letters:</h5>
        </form>

    </div>
</body>
<script>
  
    function check(){
     let a=document.getElementById("check").value.toLowerCase();
    let r=document.getElementById("result");
    let c=0;
    let b=a.split('');
        for(i=0;i<=b.length;i++){
        if(b[i]==='a' || b[i]==='e' || b[i]==='i'|| b[i]==='o' ||b[i]==='u'){
          c++;
          r.textContent="Result: " + c;
        }
        else{
         r.textContent="Result: " +c;
        }
        }
    }
     


    function rev(){
        let a=document.getElementById("reverse").value.toLowerCase();
        let result=document.getElementById("reversed");
        let counts=document.getElementById("counts");
        let count=0;
        let b=a.split('').reverse().join('');
      
            result.textContent="Reversed String: " +b;
            
       
        for(i=0;i<=b.length;i++){
            count=count+1;
        }
         counts.textContent="No.Of.Letters " +count;
    }
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</html>

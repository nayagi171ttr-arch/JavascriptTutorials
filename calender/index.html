<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure JS Calendar</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    
    <div id="login-page">
        <h2>Calendar Login</h2>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <p id="login-error" class="error-text">Invalid credentials!</p>
        <button onclick="handleLogin()">Login</button>
        <div class="login-hint">
            Admin: admin / 123 <br> User: user / 123
        </div>
    </div>

  
    <div id="calendar-page" class="hidden">
        <div class="toolbar">
            <div>
                <span id="role-badge" class="user-badge"></span>
                <select id="month-picker" onchange="render()"></select>
            </div>
            <div class="view-btns">
                <button onclick="changeView('month')">Month</button>
                <button onclick="changeView('week')">Week</button>
                <button onclick="changeView('day')">Day</button>
                <button onclick="location.reload()" class="logout-btn">Logout</button>
            </div>
        </div>

        <div class="weekday-header" id="wd-header">
            <div>SUN</div>
            <div>MON</div>
            <div>TUE</div>
            <div>WED</div>
            <div>THU</div>
            <div>FRI</div>
            <div>SAT</div>
        </div>

        <div id="calendar-grid"></div>
    </div>


    <div id="modal">
        <div class="modal-box">
            <h3 id="modal-title"></h3>
            <p id="perm-msg" class="permission-text"></p>
            <textarea id="desc-input"></textarea>
            <div class="actions">
                <button id="save-btn" class="btn-save" onclick="saveTask()">Save</button>
                <button id="del-btn" class="btn-del" onclick="deleteTask()">Delete</button>
                <button class="btn-close" onclick="closeModal()">Close</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input type="number" id="num" placeholder="enter number">
    <input type="number" id="num2" placeholder="enter 2nd number">
    <button id="btn" onclick="sum(document.getElementById('num').value,document.getElementById('num2').value)">Sum</button>
    <h2 id="result"></h2>
</body>
<script>
  
    function sum(a,b){
        
           const result=document.getElementById('result');
          let c=Number(a)+Number(b);
        result.innerHTML=c;
    }
   

</script>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
<style>
    body{
        background-color: #0f172a;
    }
</style>
</head>
<body>
    <form action="" class="form-floating">
        <div class="container rounded-4" style="max-width:500px;margin-top:200px;background-color: lavenderblush;">
        <div class="d-flex flex-column">
            <h2 class="text-primary text-center mb-3 mt-5">LOGIN FORM</h2>
               <div class="d-flex flex-row">
       <label class="form-control border-1 me-4 ms-3" style="max-width:150px;">Name:</label>:
       <input class="form-control border-1 ms-3" style="max-width:250px;"id="name" type="text" placeholder="Enter name" oninput="localStorage.setItem('name',this.value)">
       </div> 

        <div class="d-flex flex-row">
       <label class="form-control border-1 me-4 ms-3" style="max-width:150px;">Emailid:</label>:
       <input class="form-control border-1 ms-3" style="max-width:250px;"id="text" type="text" placeholder="Enter username">
       </div>

        <div class="d-flex flex-row">
       <label class="form-control border-1 me-4 ms-3" style="max-width:150px;">Password:</label>:
       <input class="form-control border-1 ms-3"  style="max-width:250px;" id="password" type="text" placeholder="enter password">
       </div>

       <div class="d-flex justify-content-center mt-5 mb-5">
        <button class="btn btn-primary text-light">Login</button>
       </div>
   
       <h6 id="result" class="text-center"></h6>
       <h6 id="passlength" class="text-center"></h6>
       </div>
       </div>
    </form>
</body>

<script>
      isvalid=false; 
  const username=document.querySelector('#text');
  username.addEventListener('input',function(){
  const result=document.querySelector('#result');
    if(!username.value.includes('@') || !username.value.includes('.')){
            result.innerHTML='Enter proper emailid';
            result.style.color="red";
           
            isvalid=false;
  }
  else{
    isvalid=true;
      result.innerHTML='Login verified';
      result.style.color="green";

  }
  })
  const password=document.querySelector('#password');
  password.addEventListener('input',function(){
      const passlength=document.querySelector('#passlength'); 
      const val=password.value; 
 const hasupper=/[A-Z]/.test(val);
  const haslower=/[a-z]/.test(val);
  const hasdigit=/\d/.test(val);
 const hasspecial=/[~!@#$%^&*()_+=`]/.test(val);
 
if(!hasupper || !haslower ||!hasdigit || !hasspecial || val.length<10){
       passlength.innerHTML='Enter valid password';
       passlength.style.color="red";
       isvalid=false;
  }
  else{
    isvalid=true;
     passlength.innerHTML='Password Verified';
       passlength.style.color="green";
        
  }
  })
  document.querySelector('.btn').addEventListener('click', function(e) {
    e.preventDefault(); 
    if (isvalid ) {
        localStorage.setItem('username', username.value);
        localStorage.setItem('password', password.value);
        alert("Login successful!! and Data saved in localstorage");
        window.location.href="welcome.html";
    } else {
        alert("Please correct the errors before logging in.");
    }
});
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Simple Expense Tracker</title>
   <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
 <style>
        body {
            background-color: #f5f5f5;
        }
        .container {
            max-width: 600px;
            margin-top: 50px;
        }
        .delete-btn {
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <h2 class="text-center mb-4"> Expense Tracker</h2>


    <div class="card p-3 mb-3">
        <input type="text" id="desc" class="form-control mb-2" placeholder="Enter description">
        <input type="number" id="amount" class="form-control mb-2" placeholder="Enter amount">
        <button class="btn btn-primary w-100" onclick="addExpense()">Add Expense</button>
    </div>
<ul class="list-group mb-3" id="expenseList"></ul>
    <div class="card p-3 text-center">
        <h4>Total: ₹ <span id="total">0</span></h4>
    </div>
</div>

<script>
    let expenses = [];

    function addExpense() {
        let desc = document.getElementById("desc").value.trim();
        let amount = document.getElementById("amount").value;

        if (desc === "" || amount === "") {
            alert("Please enter all fields");
            return;
        }

        let expense = {
            id: Date.now(),
            desc: desc,
            amount: Number(amount)
        };

        expenses.push(expense);

        displayExpenses();
        clearInputs();
    }

    function displayExpenses() {
        let list = document.getElementById("expenseList");
        list.innerHTML = "";

        let total = 0;

        expenses.forEach((item) => {
            total += item.amount;

            let li = document.createElement("li");
            li.className = "list-group-item d-flex justify-content-between align-items-center";

            li.innerHTML = `
                <span>${item.desc} - ₹${item.amount}</span>
                <button class="btn btn-danger btn-sm delete-btn" onclick="deleteExpense(${item.id})">Delete</button>
            `;

            list.appendChild(li);
        });

        document.getElementById("total").textContent = total;
    }

    function deleteExpense(id) {
        expenses = expenses.filter(item => item.id !== id);
        displayExpenses();
    }

    function clearInputs() {
        document.getElementById("desc").value = "";
        document.getElementById("amount").value = "";
    }
</script>

</body>
</html>

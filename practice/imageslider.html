<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRO9JWp7sD6uoWgt7Ee6NtWOOxR0xaaEFAqlw&s" id="img" alt="nature">
   <br><br>
   <button id="next">next</button>
   <button id="prev">prev</button>

</body>
<script>
    let images=['https://m.media-amazon.com/images/I/71c2spCI29L.jpg',
        'https://i.pinimg.com/736x/d6/c3/8b/d6c38b3298d76beb6be914f4e1b5e4cb.jpg',
        'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR4_Xl4dKBq2g1q7dbhCw2AvdHYxAchm4HcTA&s'
    ]
    let index=0;
    const next=document.getElementById('next');
    const prev=document.getElementById('prev');
    next.addEventListener('click',function(){
        index++;
        if(index>=images.length){
            index=0;
        }
        img.src=images[index];

        prev.addEventListener('click',function(){
            index--;
            if(index<0){
                index=images.length-1;
            }
            img.src=images[index];
        })
    })
</script>
</html>

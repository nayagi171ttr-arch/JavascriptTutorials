<!DOCTYPE html>
<html>

<head>
    <title>Cafe Billing System</title>
    <style>
  body {
            background: linear-gradient(135deg, #1e1e2f 0%, #121212 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        h1 { 
            margin-bottom: 30px; 
            font-weight: 300; 
            letter-spacing: 2px; 
        }

        .items {
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: none;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            background: rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.1);
        }

        
        button {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            border-radius: 8px;
            border: none;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button[onclick="addItem()"] {
            background: #f39c12;
            color: white;
        }

        button[onclick="generateBill()"] {
            background: #27ae60;
            color: white;
        }

        button:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }

        button:active {
             transform: translateY(0); 
            }

        .container{
            background-color: white;
            color:black;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #bill {
            margin-top: 30px;
            width: 100%;
            max-width: 500px;
            text-align: center;
        }

        .bill-item {
            display: flex;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.03);
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 5px;
        }
        
    </style>
</head>

<body>
    <h1>Cafe Billing System</h1>
    <h2>Available Items</h2>
    <div id="items"></div>
    <hr>
    <div class="items">
    <input type="text" id="item" placeholder="Enter Item Name">
    <input type="number" id="qty" placeholder="Enter Quantity">
    <button onclick="addItem()">Add Item</button>
   <button onclick="generateBill()">Generate Bill</button>
   </div>
   <hr>

   <div class="container">
   <div id="bill"></div>
   </div>




    <script>
        let cart = [];
        showItems();
       async function showItems() {
            let api = "https://dummyjson.com/products";
            let response = await fetch(api);
            let data = await response.json();
            let products = data.products;
            items.innerHTML = "";
            products.forEach(val => {
                items.innerHTML += `<p>${val.title} - ₹${val.price}</p>`;
            });
        }
         async function addItem() {
            let itemName = document.getElementById("item").value;
            let quantity = Number(document.getElementById("qty").value);
            let api = "https://dummyjson.com/products";
            let response = await fetch(api);
            let data = await response.json();
            let products = data.products;
            let item = products.find(val =>
                val.title.toLowerCase().includes(itemName.toLowerCase())
            );
            if (!item) {
               alert("Item Not Found");
                return;
            }
            cart.push({
               name: item.title,
                price: item.price,
                qty: quantity,
                total: item.price * quantity
            });
            alert("Item Added Successfully");
            console.log(cart);
            item.value = "";
            qty.value = "";

        }

        function generateBill() {
           bill.innerHTML = "<h2 id='center'><p>****************************</p>Final Bill<p>****************************</p></h2>";
            let grandTotal = 0;
            cart.forEach(val => {
                grandTotal += val.total;
                bill.innerHTML += `<p >${val.name}  x  ${val.qty}=  ₹${val.total}</p>`;
            });
            bill.innerHTML += `<hr><h2 >Grand Total : ₹${grandTotal}</h2>`;
        }
    </script>
</body>
</html>

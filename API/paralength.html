<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
      
body {
    background-color: #0f172a; /* Deep dark blue */
    font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    margin: 0;
    color: #f8fafc;
}


.checker-box {
    background: #1e293b;
    border: 1px solid #334155;
    padding: 2rem;
    border-radius: 12px;
    box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
    width: 350px;
    margin-bottom: 2rem;
    text-align: center;
}


.checker-box h3 {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #94a3b8;
    margin-bottom: 1.5rem;
    border-bottom: 1px solid #334155;
    padding-bottom: 0.5rem;
}


input {
    width: 100%;
    background-color: #0f172a;
    border: 1px solid #475569;
    padding: 12px;
    border-radius: 8px;
    color: white;
    font-size: 1rem;
    box-sizing: border-box;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
}

input:focus {
    border-color: #38bdf8;
    box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.2);
}


h2 {
    margin: 1rem 0 0.5rem 0;
    font-size: 1.25rem;
    word-break: break-all; 
    min-height: 1.5rem;
}

#result {
    font-weight: 800;
    text-transform: uppercase;
    font-size: 0.9rem;
    letter-spacing: 0.05em;
}
    </style>
</head>
<body>
   <!-- Wrapper for the first tool -->
<div class="checker-box">
    <h3>Character Counter</h3>
    <input type="text" id="error" placeholder="Enter text">
    <h2 id="find"></h2>
</div>

<!-- Wrapper for the second tool -->
<div class="checker-box">
    <h3>Password Strength</h3>
    <input type="text" id="pass" placeholder="Enter your password">
    <h2 id="check"></h2>
    <h2 id="result"></h2>
</div>
</body>
  <script>
    const error=document.querySelector('#error');
    const ide=document.querySelector('#find');
    error.addEventListener('input',function(){
       ide.innerHTML=error.value;
       if(error.value.length>=50){
        ide.style.color="red";
       }
       else{
        ide.style.color="green";
       }
    })

    const pass=document.querySelector('#pass');
    const check=document.querySelector('#check');
    const result=document.querySelector('#result');
    pass.addEventListener('input',function(){
        check.innerHTML=pass.value;
        if(pass.value.length<=4){
            check.style.color="red";
            result.innerHTML='Weak password';
            result.style.color="red";
        }
        else if(pass.value.length>=5 && pass.value.length<=15){
            check.style.color="orange";
            result.innerHTML='Medium password';
            result.style.color="orange";
        }
        else{
            check.style.color="green";
            result.innerHTML='Strong password';
            result.style.color="green";
        }
    })
  </script>
</html>

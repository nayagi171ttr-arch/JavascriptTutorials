<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            background-color: gray;
        }
        h2{
            text-align: center;
            margin-top: 100px;
            margin-bottom: 40px;
            padding-top: 40px;
        }
        .align{
             text-align:center;
             color:blue;
        }
        .container{
            background-color: lavenderblush;
            max-width:700px;
            text-align: center;
            margin-left:400px;
            border-radius: 10px;
        }
        #word{
            padding-bottom: 10px;
        }
        #defi{
            padding-bottom: 20px;
        }

    </style>
</head>
<body>
    <div class="container">
    <h2>!!!Search your words here!!!</h2>
    <div class="align">
    <input type="text" placeholder="enter word" id="word">
    <button type="button" id="btn">Search</button>
    <h2 id="defi"></h2>
    </div>
    </div>
</body>

<script>
    let getmeaning=async(word)=>{
        let meaningapi=`https://api.dictionaryapi.dev/api/v2/entries/en/${word}`;
        let meaningresp=await fetch(meaningapi);
        let resp=await meaningresp.json();
        return resp;
    }

    const words=document.getElementById('word').value;
    const button=document.getElementById('btn');

    button.addEventListener('click',()=>{
        const words=document.getElementById('word');
         const wordsappend=words.value.trim();
        if(wordsappend!==""){
            searchforword(wordsappend);
        }
        else{
            alert('enter text to search');
        }
    })
    
    async function searchforword(words){
          getmeaning(words)
          .then(response=>{
            console.log(response)
           const meaningText = response[0].meanings[0].definitions[0].definition;
                    
                    document.getElementById('defi').innerHTML = `Definition: ${meaningText}`;   
         
          })
}

</script>
</html>
